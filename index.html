<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Learning V3 - Fixed Session</title>
  <style>
    /* ... (your design styles) ... */
    body { background: #0a0a12; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
    #nav { display: flex; gap: 10px; padding: 20px; background: #111; border-bottom: 2px solid #00f2ff; }
    .nav-btn { padding: 10px 20px; background: #222; border: 1px solid #00f2ff; color: #00f2ff; cursor: pointer; }
    .content { display: none; height: calc(100vh - 80px); }
    .content.active { display: block; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <div id="nav">
    <button class="nav-btn" onclick="switchTab('home')">HOME</button>
    <button class="nav-btn" onclick="switchTab('cloud')">CLOUD GAME</button>
  </div>

  <div id="home" class="content active">
    <h1>WELCOME TO LEARNING V3</h1>
  </div>

  <div id="cloud" class="content">
    <iframe id="game-frame" src="" allow="autoplay; fullscreen; gamepad"></iframe>
  </div>

  <script>
    function switchTab(tabId) {
      // Hide all content
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      // Show selected content
      document.getElementById(tabId).classList.add('active');

      if (tabId === 'cloud') {
        const frame = document.getElementById('game-frame');
        // This line fixes the ?t= issue by adding a fresh timestamp
        const freshSessionUrl = "https://cdn.jsdelivr.net/gh/CloudMoonApp/web@main/play-2604131056.html?t=" + Date.now();
        frame.src = freshSessionUrl;
      }
    }
  </script>
</body>
</html>
