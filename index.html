<html lang="en">

  <style>
    :root {
      --neon: #00f2ff;
      --neon-glow: rgba(0, 242, 255, 0.35);
      --bg: #0a0a12;
      --cursor-default: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M5 3l14 9-14 9V3z" fill="black" stroke="%2300f2ff" stroke-width="2" stroke-join="round"/><path d="M6 6l9 6-9 6V6z" fill="%2300f2ff"/></svg>') 0 0, auto;
      --cursor-pointer: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="%23ff00aa" stroke-width="2"/><circle cx="12" cy="12" r="2" fill="%23ff00aa"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="%23ff00aa" stroke-width="2"/></svg>') 12 12, pointer;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: white; font-family: "Segoe UI", sans-serif; overflow: hidden; height: 100vh; cursor: var(--cursor-default); }
    
    button, .nav-btn, .game-card { cursor: var(--cursor-pointer) !important; }

    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: rgba(5, 8, 20, 0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 242, 255, 0.16);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; z-index: 1000;
    }

    #nav {
      position: fixed; top: 60px; left: 0; right: 0; height: 64px;
      background: rgba(8, 12, 28, 0.92); backdrop-filter: blur(18px);
      display: flex; justify-content: center; align-items: center;
      gap: 15px; z-index: 999; border-bottom: 1px solid rgba(0, 242, 255, 0.18);
    }

    .nav-btn {
      padding: 8px 18px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); color: #c8d7ff;
      font-weight: 700; text-transform: uppercase; font-size: 11px;
      border-radius: 999px; transition: all 0.3s ease;
    }

    .nav-btn.active, .nav-btn:hover {
      color: white; border-color: var(--neon);
      background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 15px var(--neon-glow);
    }
