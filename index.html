<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning V3</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Segoe+UI:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon: #00f2ff;
      --neon-glow: rgba(0, 242, 255, 0.35);
      --bg: #0a0a12;
      --cursor-default: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M5 3l14 9-14 9V3z" fill="black" stroke="%2300f2ff" stroke-width="2" stroke-join="round"/><path d="M6 6l9 6-9 6V6z" fill="%2300f2ff"/></svg>') 0 0, auto;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: white; font-family: "Segoe UI", sans-serif; overflow: hidden; height: 100vh; cursor: var(--cursor-default); }

    #nav {
      position: fixed; top: 0; left: 0; right: 0; height: 70px;
      background: rgba(8, 12, 28, 0.95); backdrop-filter: blur(10px);
      display: flex; justify-content: center; align-items: center;
      gap: 15px; z-index: 1000; border-bottom: 2px solid var(--neon);
    }

    .nav-btn {
      padding: 10px 20px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--neon); color: white;
      font-weight: 700; text-transform: uppercase; border-radius: 5px;
      transition: 0.3s; cursor: pointer;
    }

    .nav-btn.active, .nav-btn:hover {
      background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon-glow);
    }

    .content {
      position: absolute; top: 70px; left: 0; right: 0; bottom: 0;
      display: none; padding: 20px;
    }

    .content.active { display: block; }

    #cloud-game iframe {
      width: 100%; height: 100%; border: none; border-radius: 10px;
      background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .welcome-text {
      font-family: "Unbounded"; font-size: 4rem; text-align: center;
      margin-top: 15vh; color: var(--neon); text-shadow: 0 0 20px var(--neon-glow);
    }
  </style>
</head>
<body>

  <div id="nav">
    <button class="nav-btn active" onclick="switchTab(0)">HOME</button>
    <button class="nav-btn" onclick="switchTab(1)">GAMES</button>
    <button class="nav-btn" onclick="switchTab(2)">MOVIES</button>
    <button class="nav-btn" onclick="switchTab(3)">CLOUD GAME</button>
  </div>

  <div id="home" class="content active">
    <div class="welcome-text">WELCOME TO<br>LEARNING V3</div>
  </div>

  <div id="games" class="content">
    <h2>Games Section</h2>
    <p>Add your game cards here.</p>
  </div>

  <div id="movies" class="content">
    <h2>Movies Section</h2>
    <p>Add your movie players here.</p>
  </div>

  <div id="cloud-game" class="content">
    <iframe 
      id="cloud-frame"
      src="https://cdn.jsdelivr.net/gh/CloudMoonApp/web@main/play-2604131056.html" 
      allow="autoplay; fullscreen; keyboard; gamepad"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>

  <script>
    function switchTab(n) {
      const tabs = ['home', 'games', 'movies', 'cloud-game'];
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      
      const target = tabs[n];
      document.getElementById(target).classList.add('active');
      document.querySelectorAll('.nav-btn')[n].classList.add('active');

      // Refresh Cloud Game session on click
      if (target === 'cloud-game') {
        const frame = document.getElementById('cloud-frame');
        frame.src = "https://cdn.jsdelivr.net/gh/CloudMoonApp/web@main/play-2604131056.html?t=" + Date.now();
      }
    }
  </script>
</body>
</html>
